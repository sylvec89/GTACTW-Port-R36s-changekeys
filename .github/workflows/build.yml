name: Build GTACTW R36S

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            gcc-arm-linux-gnueabihf

      - name: Show repository
        run: |
          echo "===== Repository tree ====="
          find . -maxdepth 3

      - name: Build
        run: make
