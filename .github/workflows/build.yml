name: Build GTACTW R36S

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable armhf
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update

      - name: Install toolchain
        run: |
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            libsdl2-dev:armhf \
            libopenal-dev:armhf \
            libgles2-mesa-dev:armhf \
            libegl1-mesa-dev:armhf \
            libz-dev:armhf

      - name: Build
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gtactw_r36
          path: gtactw_r36
